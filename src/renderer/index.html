<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Reader</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/katex.min.css">
</head>
<body>

  <!-- Toolbar -->
  <header id="toolbar">
    <div class="toolbar-left">
      <button id="btn-open" title="Open File (Ctrl+O)" class="toolbar-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        <span class="btn-label">Open</span>
      </button>
      <div class="dropdown" id="recent-dropdown">
        <button id="btn-recent" title="Recent Files" class="toolbar-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span class="btn-label">Recent</span>
        </button>
        <div class="dropdown-content" id="recent-list">
          <div class="dropdown-empty">No recent files</div>
        </div>
      </div>
      <span class="toolbar-sep">|</span>
      <!-- Edit toggle button -->
      <button id="btn-edit-mode" title="Toggle Edit Mode" class="toolbar-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        <span class="btn-label">Edit</span>
      </button>
      <span class="toolbar-sep">|</span>
      <button id="btn-theme" title="Toggle Theme" class="toolbar-btn">
        <svg id="icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <span class="btn-label">Theme</span>
      </button>
      <span class="toolbar-sep">|</span>
      <button id="btn-zoom-out" title="Zoom Out (Ctrl+-)" class="toolbar-btn zoom-btn">A⁻</button>
      <span id="zoom-level" class="zoom-label">100%</span>
      <button id="btn-zoom-in" title="Zoom In (Ctrl+=)" class="toolbar-btn zoom-btn">A⁺</button>
      <button id="btn-zoom-reset" title="Reset Zoom (Ctrl+0)" class="toolbar-btn zoom-btn">A</button>
    </div>
    <div class="toolbar-right">
      <button id="btn-copy" title="Copy rendered content for WeChat paste" class="toolbar-btn copy-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span class="btn-label">Copy</span>
      </button>
      <button id="btn-export-html" title="Export to HTML" class="toolbar-btn export-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span class="btn-label">HTML</span>
      </button>
      <button id="btn-export-pdf" title="Export to PDF" class="toolbar-btn export-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        <span class="btn-label">PDF</span>
      </button>
      <button id="btn-export-word" title="Export to Word" class="toolbar-btn export-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="18" rx="2" ry="2"/>
          <line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/>
        </svg>
        <span class="btn-label">Word</span>
      </button>
    </div>
  </header>

  <!-- Tab Bar -->
  <nav id="tab-bar"></nav>

  <!-- Edit Formatting Toolbar (hidden by default) -->
  <div id="edit-toolbar" style="display:none">
    <button id="btn-fmt-bold" title="Bold (Ctrl+B)" class="edit-btn"><b>B</b></button>
    <button id="btn-fmt-underline" title="Underline" class="edit-btn"><u>U</u></button>
    <button id="btn-fmt-katex" title="Inline Formula ($...$)" class="edit-btn">ƒ(x)</button>
    <button id="btn-fmt-braces" title="Wrap in {braces}" class="edit-btn">{ }</button>
    <span class="edit-sep">|</span>
    <button id="btn-fmt-save" title="Save (Ctrl+S)" class="edit-btn save">💾 Save</button>
    <span id="edit-status" class="edit-status"></span>
  </div>

  <!-- Main Layout -->
  <div id="main-layout">
    <!-- TOC Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h3>Contents</h3>
        <button id="btn-toggle-sidebar" title="Toggle Sidebar" class="icon-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
      </div>
      <nav id="toc-nav" class="toc-nav"></nav>
    </aside>

    <!-- Content Area -->
    <main id="content-area">
      <!-- Split View Container (hidden by default) -->
      <div id="split-view" style="display:none">
        <div id="editor-pane">
          <textarea id="md-editor" placeholder="Markdown source..." spellcheck="false"></textarea>
        </div>
        <div id="split-divider"></div>
        <div id="preview-pane">
          <div id="preview-content" class="markdown-body"></div>
        </div>
      </div>

      <!-- Single View (default) -->
      <div id="content" class="markdown-body">
        <div id="welcome" class="welcome-screen">
          <div class="welcome-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </div>
          <h2>Markdown Reader</h2>
          <p>Open a Markdown file to get started</p>
          <div class="welcome-shortcuts">
            <kbd>Ctrl+O</kbd> Open File &nbsp; <kbd>Ctrl+E</kbd> Edit Mode
          </div>
          <p class="welcome-drag">Or drag &amp; drop a <code>.md</code> file here</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Mini Toggle Button when sidebar collapsed -->
  <button id="btn-expand-sidebar" title="Show Contents" class="floating-btn" style="display:none">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- Status Bar -->
  <footer id="statusbar">
    <span id="status-filename">No file opened</span>
    <span class="status-sep">|</span>
    <span id="status-wordcount">Words: 0</span>
    <span class="status-sep">|</span>
    <span id="status-zoom">Zoom: 100%</span>
    <span class="status-sep">|</span>
    <span id="status-theme">Theme: Light</span>
  </footer>

  <!-- Scripts -->
  <script src="js/mermaid.min.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/exporter.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
